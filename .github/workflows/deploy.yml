name: Deploy to Hostinger VPS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 22199 195.35.1.103 >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -p 22199 root@195.35.1.103 "cd /var/www/html/tasbeeh.ismailerkan.com && git pull origin main"
